<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NextWealth™ Global</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #0a0a0a, #000000);
      color: white;
      text-align: center;
      padding: 60px 20px;
    }

    h1 {
      font-size: 3em;
      background: linear-gradient(90deg, gold, #ffd700, #fff5cc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    h2 {
      font-weight: normal;
      color: #ccc;
      margin-bottom: 40px;
    }

    .box {
      max-width: 500px;
      margin: auto;
      padding: 30px;
      border: 1px solid rgba(255, 215, 0, 0.3);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.02);
    }

    .btn {
      margin-top: 25px;
      display: inline-block;
      padding: 14px 30px;
      border: 1px solid gold;
      color: gold;
      text-decoration: none;
      transition: 0.3s;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .btn:hover {
      background: gold;
      color: black;
    }

    .sub {
      margin-top: 20px;
      font-size: 0.9em;
      color: #888;
    }
  </style>
</head>

<body>

  <h1>NextWealth™ Global</h1>
  <h2>Financial Intelligence • Passive Income • Global Scale</h2>

  <div class="box">
    <p>
      Build scalable income systems.<br>
      Access elite financial strategies.<br>
      Enter the future of wealth creation.
    </p>

    <a class="btn" href="#">ENTER PLATFORM</a>

    <div class="sub">
      Private access • Invite-based system • Global expansion underway
    </div>
  </div>

</body>
</html>
